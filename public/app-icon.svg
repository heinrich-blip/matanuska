<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Stylized truck icon -->
  <g transform="translate(60, 120)">
    <!-- Cargo container -->
    <rect x="0" y="60" width="240" height="140" rx="12" fill="url(#truckGrad)" stroke="#64748b" stroke-width="2"/>
    
    <!-- Container details -->
    <rect x="20" y="80" width="60" height="100" rx="4" fill="#0f172a" opacity="0.3"/>
    <rect x="90" y="80" width="60" height="100" rx="4" fill="#0f172a" opacity="0.3"/>
    <rect x="160" y="80" width="60" height="100" rx="4" fill="#0f172a" opacity="0.3"/>
    
    <!-- Cab -->
    <path d="M260 100h60c16.6 0 30 13.4 30 30v70h-90V100z" fill="url(#truckGrad)" stroke="#64748b" stroke-width="2"/>
    
    <!-- Window -->
    <path d="M270 115h40c8.8 0 16 7.2 16 16v25h-72V115c0-8.8 7.2-16 16-16z" fill="#1e3a5f"/>
    
    <!-- Accent stripe -->
    <rect x="0" y="180" width="390" height="8" fill="url(#accentGrad)" filter="url(#glow)"/>
  </g>

  <!-- Wheels -->
  <g>
    <!-- Rear wheels -->
    <circle cx="150" cy="380" r="45" fill="#1f2937" stroke="#374151" stroke-width="4"/>
    <circle cx="150" cy="380" r="28" fill="#0f172a"/>
    <circle cx="150" cy="380" r="14" fill="#f59e0b"/>
    <circle cx="150" cy="380" r="6" fill="#374151"/>
    
    <!-- Front wheel -->
    <circle cx="360" cy="380" r="45" fill="#1f2937" stroke="#374151" stroke-width="4"/>
    <circle cx="360" cy="380" r="28" fill="#0f172a"/>
    <circle cx="360" cy="380" r="14" fill="#f59e0b"/>
    <circle cx="360" cy="380" r="6" fill="#374151"/>
  </g>

  <!-- Gear/fleet indicator -->
  <g transform="translate(380, 60)" filter="url(#glow)">
    <circle cx="40" cy="40" r="36" fill="#f59e0b" opacity="0.9"/>
    <circle cx="40" cy="40" r="24" fill="none" stroke="#0f172a" stroke-width="6"/>
    <circle cx="40" cy="40" r="12" fill="#0f172a"/>
    <circle cx="40" cy="16" r="6" fill="#0f172a"/>
    <circle cx="40" cy="64" r="6" fill="#0f172a"/>
    <circle cx="16" cy="40" r="6" fill="#0f172a"/>
    <circle cx="64" cy="40" r="6" fill="#0f172a"/>
  </g>
</svg>
