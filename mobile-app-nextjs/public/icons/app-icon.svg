<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- Inner subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Truck body with shadow -->
  <g filter="url(#shadow)">
    <!-- Main truck body -->
    <path d="M96 224h224v112c0 17.7-14.3 32-32 32H128c-17.7 0-32-14.3-32-32V224z" fill="url(#truckGradient)"/>

    <!-- Truck cab -->
    <path d="M320 240h48c17.7 0 33.4 11.4 38.8 28.2l24 74.8c2.1 6.5 3.2 13.3 3.2 20.2V368h-114V240z" fill="url(#truckGradient)"/>

    <!-- Windshield -->
    <path d="M336 256h32c8 0 15.2 5 18 12.4l16 42.4c1.4 3.6 2 7.5 2 11.2v14H336V256z" fill="#1e40af" opacity="0.7"/>

    <!-- Cargo area lines -->
    <rect x="112" y="248" width="8" height="80" rx="2" fill="#1e40af" opacity="0.15"/>
    <rect x="144" y="248" width="8" height="80" rx="2" fill="#1e40af" opacity="0.15"/>
    <rect x="176" y="248" width="8" height="80" rx="2" fill="#1e40af" opacity="0.15"/>
    <rect x="208" y="248" width="8" height="80" rx="2" fill="#1e40af" opacity="0.15"/>
    <rect x="240" y="248" width="8" height="80" rx="2" fill="#1e40af" opacity="0.15"/>
    <rect x="272" y="248" width="8" height="80" rx="2" fill="#1e40af" opacity="0.15"/>
  </g>

  <!-- Road/Ground -->
  <rect x="64" y="368" width="384" height="16" rx="8" fill="rgba(255,255,255,0.3)"/>

  <!-- Wheels -->
  <g>
    <!-- Front wheel -->
    <circle cx="160" cy="368" r="40" fill="#374151"/>
    <circle cx="160" cy="368" r="32" fill="#1f2937"/>
    <circle cx="160" cy="368" r="16" fill="#6b7280"/>
    <circle cx="160" cy="368" r="8" fill="#374151"/>

    <!-- Rear wheel -->
    <circle cx="288" cy="368" r="40" fill="#374151"/>
    <circle cx="288" cy="368" r="32" fill="#1f2937"/>
    <circle cx="288" cy="368" r="16" fill="#6b7280"/>
    <circle cx="288" cy="368" r="8" fill="#374151"/>

    <!-- Cab wheel -->
    <circle cx="384" cy="368" r="40" fill="#374151"/>
    <circle cx="384" cy="368" r="32" fill="#1f2937"/>
    <circle cx="384" cy="368" r="16" fill="#6b7280"/>
    <circle cx="384" cy="368" r="8" fill="#374151"/>
  </g>

  <!-- Headlight -->
  <ellipse cx="420" cy="320" rx="12" ry="16" fill="#fbbf24"/>

  <!-- Company initial "M" badge -->
  <g transform="translate(168, 136)">
    <circle cx="88" cy="44" r="52" fill="rgba(255,255,255,0.95)"/>
    <text x="88" y="64" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1e40af" text-anchor="middle">M</text>
  </g>
</svg>
